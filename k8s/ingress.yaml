apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: micro-ingress
spec:
  ingressClassName: nginx   # 👈 ADD THIS LINE
  rules:
    - http:
        paths:
          - path: /get-products
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3000